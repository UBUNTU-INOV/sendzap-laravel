name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Laravel 10 and 11 are past their security-support window and have no
      # patched laravel/framework release for current advisories, so Composer's
      # audit refuses to install them. Only test the actively maintained majors
      # here; illuminate/support's own composer.json constraint still allows
      # 10.x/11.x for consumers (see "require" in composer.json).
      matrix:
        include:
          - php: '8.2'
            testbench: '^10.0'
            laravel: '12.*'
          - php: '8.3'
            testbench: '^10.0'
            laravel: '12.*'
          - php: '8.4'
            testbench: '^10.0'
            laravel: '12.*'
          - php: '8.3'
            testbench: '^11.0'
            laravel: '13.*'
          - php: '8.4'
            testbench: '^11.0'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction
          composer update --prefer-dist --no-progress --prefer-stable

      - name: Run tests
        run: vendor/bin/phpunit --colors=never

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Run static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --error-format=github
